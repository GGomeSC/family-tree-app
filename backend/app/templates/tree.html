<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="tree.css" />
</head>
<body>
  {% for page in pages %}
    <section class="page">
      <div class="header">Árvore Genealógica - {{ case.title }} - Página {{ page.number + 1 }} de {{ pages|length }}</div>
      {% if loop.first %}
        <div class="legend">
          <div class="legend-item"><span class="legend-box legend-lineage"></span> Linha de descendência</div>
          <div class="legend-item"><span class="legend-box legend-spouse"></span> Cônjuges</div>
        </div>
      {% endif %}
      <div class="canvas">
        <svg class="tree-canvas" xmlns="http://www.w3.org/2000/svg">
          {% for union in page.unions %}
            {% set pa = persons_by_id[union.partner_a_person_id] %}
            {% set pb = persons_by_id[union.partner_b_person_id] %}
            <line x1="{{ pa.x + (box_w/2) }}" y1="{{ (pa.y - page.number * page_height) + 28 }}" x2="{{ pb.x + (box_w/2) }}" y2="{{ (pb.y - page.number * page_height) + 28 }}" stroke="#1b6690" stroke-width="2" />
          {% endfor %}

          {% for edge in page.edges %}
            {% set parent = persons_by_id[edge.from_id] %}
            {% set child = persons_by_id[edge.to_id] %}
            {% if edge.via_union_id %}
              {% set union = unions_by_id[edge.via_union_id] %}
              {% set pa = persons_by_id[union.partner_a_person_id] %}
              {% set pb = persons_by_id[union.partner_b_person_id] %}
              {% set midx = (pa.x + pb.x + box_w) / 2 %}
              <line x1="{{ midx }}" y1="{{ (pa.y - page.number * page_height) + 28 }}" x2="{{ midx }}" y2="{{ (child.y - page.number * page_height) - 12 }}" stroke="#1b6690" stroke-width="2" />
              <line x1="{{ midx }}" y1="{{ (child.y - page.number * page_height) - 12 }}" x2="{{ child.x + (box_w/2) }}" y2="{{ (child.y - page.number * page_height) - 12 }}" stroke="#1b6690" stroke-width="2" />
            {% else %}
              <line x1="{{ parent.x + (box_w/2) }}" y1="{{ (parent.y - page.number * page_height) + box_h }}" x2="{{ child.x + (box_w/2) }}" y2="{{ (child.y - page.number * page_height) }}" stroke="#1b6690" stroke-width="2" />
            {% endif %}
          {% endfor %}

          {% for cont in page.continuations %}
            {% if cont.from_page == page.number %}
              {% set from_person = persons_by_id[cont.from_id] %}
              <text x="{{ from_person.x + (box_w/2) }}" y="{{ (from_person.y - page.number * page_height) + box_h + 16 }}" class="continuation">continua na página {{ cont.to_page + 1 }}</text>
            {% endif %}
            {% if cont.to_page == page.number %}
              {% set to_person = persons_by_id[cont.to_id] %}
              <text x="{{ to_person.x + (box_w/2) }}" y="{{ (to_person.y - page.number * page_height) - 16 }}" class="continuation">continuação da página {{ cont.from_page + 1 }}</text>
            {% endif %}
          {% endfor %}

          {% for union in page.unions %}
            {% if union.marriage_date %}
              {% set pa = persons_by_id[union.partner_a_person_id] %}
              {% set pb = persons_by_id[union.partner_b_person_id] %}
              {% set midx = (pa.x + pb.x + box_w) / 2 %}
              <text class="marriage-label" x="{{ midx }}" y="{{ (pa.y - page.number * page_height) + 11 }}" text-anchor="middle">
                {{ union.marriage_date }}
              </text>
            {% endif %}
          {% endfor %}

          {% for person in page.persons %}
            {% set node_y = person.y - page.number * page_height %}
            <g class="node {{ person.role }}" transform="translate({{ person.x }}, {{ node_y }})">
              <rect class="node-box" x="0" y="0" width="{{ box_w }}" height="{{ box_h }}" rx="3" ry="3" />
              <text class="node-name" x="{{ box_w / 2 }}" y="28" text-anchor="middle" textLength="{{ box_w - 20 }}" lengthAdjust="spacingAndGlyphs">
                {{ person.name }}
              </text>
              <text class="node-birth" x="{{ box_w / 2 }}" y="52" text-anchor="middle">
                {{ person.birth_date }}
              </text>
              {% if person.is_richiedente %}
                <rect class="badge-box" x="{{ (box_w - 108) / 2 }}" y="{{ box_h + 4 }}" width="108" height="20" rx="2" ry="2" />
                <text class="badge-text" x="{{ box_w / 2 }}" y="{{ box_h + 18 }}" text-anchor="middle">Richiedente</text>
              {% endif %}
            </g>
          {% endfor %}
        </svg>
      </div>
    </section>
  {% endfor %}
</body>
</html>
