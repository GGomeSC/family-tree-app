name: Deploy Mock Preview to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Only run when the static mock preview or its build config can change.
      - .github/workflows/deploy-pages.yml
      - frontend/.env.mock
      - frontend/index.html
      - frontend/package.json
      - frontend/package-lock.json
      - frontend/tsconfig.json
      - frontend/vite.config.ts
      - frontend/src/main.tsx
      - frontend/src/App.tsx
      - frontend/src/styles.css
      - frontend/src/components/HierarchyPreview.tsx
      - frontend/src/config/layout.ts
      - frontend/src/config/runtime.ts
      - frontend/src/mocks/**
      - frontend/src/pages/MockPreviewPage.tsx
      - frontend/src/types/index.ts
      - frontend/src/utils/formatters.ts
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: &runner ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static mock preview
        run: npm run build:mock

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: *runner
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4